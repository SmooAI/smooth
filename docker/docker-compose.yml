# Smooth — Docker Compose (postgres only)
# Leader runs natively via `tsx watch` for fast local dev.
# Smooth Operators run in Microsandbox microVMs, not Docker containers.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: smooth
      POSTGRES_USER: smooth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smooth_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - smooth-pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smooth"]
      interval: 10s
      retries: 5
    labels:
      - "com.smooth.protect=true"

volumes:
  smooth-pgdata:
    external: false
    labels:
      com.smooth.protect: "true"
