services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: smooth
      POSTGRES_USER: smooth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smooth_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - smooth-pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smooth"]
      interval: 10s
      retries: 5
    labels:
      - "com.smooth.protect=true"
    networks:
      - smooth-net

  leader:
    build:
      context: ..
      dockerfile: docker/leader/Dockerfile
    restart: unless-stopped
    ports:
      - "4400:4400"
    environment:
      DATABASE_URL: postgresql://smooth:${POSTGRES_PASSWORD:-smooth_dev_password}@postgres:5432/smooth
      BEADS_DIR: /data/.beads
    volumes:
      - smooth-beads:/data/.beads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smooth-net

networks:
  smooth-net:
    driver: bridge

volumes:
  smooth-pgdata:
    external: false
    labels:
      com.smooth.protect: "true"
  smooth-beads:
    external: false
