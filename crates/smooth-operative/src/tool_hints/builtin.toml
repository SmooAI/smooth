# Built-in tool hints. Loaded by `tool_hints::builtin_hints()` and merged
# with `~/.smooth/tool_hints/*.toml` and `<workspace>/.smooth/tool_hints/*.toml`.
# Project hints win over user hints win over these on intent collision.

[[hint]]
intent = "list github repos"
keywords = ["github", "repos", "repositories", "gh", "git remote"]
preferred = "gh CLI"
command = "gh repo list --limit 50 --json name,description,visibility,updatedAt,isArchived"
notes = "Requires `gh` installed and authed (`gh auth status`). Use `--visibility public|private` to filter, `--owner <org>` for an org's repos. JSON is easy to parse with jq."
fallback = "curl -s -H \"Authorization: Bearer $GITHUB_TOKEN\" 'https://api.github.com/user/repos?per_page=100'"

[[hint]]
intent = "show github repo info"
keywords = ["github", "repo", "describe", "view"]
preferred = "gh CLI"
command = "gh repo view <owner>/<name> --json name,description,defaultBranchRef,latestRelease,stargazerCount"
notes = "Returns structured JSON. For unauthenticated public-repo lookups use the API fallback."
fallback = "curl -s 'https://api.github.com/repos/<owner>/<name>'"

[[hint]]
intent = "search github code"
keywords = ["github", "search", "code"]
preferred = "gh CLI"
command = "gh search code 'query' --limit 30 --json repository,path,url"
notes = "Use --owner to scope to a user or org. `gh search repos` for repo search; `gh search issues` for issues."
fallback = ""

[[hint]]
intent = "list github prs"
keywords = ["github", "pr", "pull request", "prs"]
preferred = "gh CLI"
command = "gh pr list --limit 30 --json number,title,state,author,headRefName,createdAt,url"
notes = "Add `--state all` to include closed/merged. Use `--repo <owner>/<name>` to scope outside the cwd."
fallback = ""

[[hint]]
intent = "list github issues"
keywords = ["github", "issue", "issues"]
preferred = "gh CLI"
command = "gh issue list --limit 30 --json number,title,state,author,labels,createdAt,url"
notes = "`--state all` to include closed. `--label X` to filter."
fallback = ""

[[hint]]
intent = "format json"
keywords = ["json", "pretty", "format", "parse"]
preferred = "jq"
command = "jq '.' <file>     # or:    cat file | jq '.'"
notes = "`jq -r '.field'` for raw values. `jq -c` for compact (one line per record). For large files use `jq --stream`."
fallback = "python3 -m json.tool <file>"

[[hint]]
intent = "search the web"
keywords = ["web", "search", "google", "duckduckgo"]
preferred = "duckduckgo HTML scrape"
command = "curl -s -A 'Mozilla/5.0' \"https://duckduckgo.com/html/?q=<query>\" | grep -oE 'href=\"[^\"]+\"' | head -20"
notes = "DDG's HTML endpoint doesn't require API auth and tolerates light scraping. For higher-volume use, prefer firecrawl/serper if MCP is configured."
fallback = "curl -s 'https://api.duckduckgo.com/?q=<query>&format=json'"

[[hint]]
intent = "fetch url"
keywords = ["fetch", "url", "http", "download", "curl"]
preferred = "curl"
command = "curl -fsSL <url>"
notes = "`-f` fails on HTTP error, `-s` silent, `-S` show errors when -s, `-L` follows redirects. Add `-H 'Authorization: Bearer ...'` for authed calls."
fallback = "wget -qO- <url>"

[[hint]]
intent = "find files"
keywords = ["find", "search", "files", "fs"]
preferred = "fd or rg --files"
command = "fd <pattern>     # or:    rg --files | rg <pattern>"
notes = "`fd` (or `fdfind`) is fast and gitignore-aware. Use `find . -name <pattern>` if neither is installed."
fallback = "find . -name '<pattern>' -type f"

[[hint]]
intent = "search file contents"
keywords = ["grep", "search", "ripgrep", "rg", "contents"]
preferred = "ripgrep (rg)"
command = "rg <pattern>     # or:   rg -t rust <pattern>     to scope by language"
notes = "`-i` case-insensitive, `-n` line numbers, `-A 3 -B 3` for context, `--json` for machine-readable output."
fallback = "grep -rn <pattern> ."

[[hint]]
intent = "git log"
keywords = ["git", "log", "history", "commits"]
preferred = "git log"
command = "git log --oneline -20     # or:    git log --since='7 days ago' --pretty=format:'%h %ae %s'"
notes = "Use `git log -p` for diffs, `git log --stat` for file change summaries, `git log <file>` to scope to a file."
fallback = ""

[[hint]]
intent = "git diff"
keywords = ["git", "diff", "changes", "review"]
preferred = "git diff"
command = "git diff main...HEAD     # for branch changes vs main"
notes = "`git diff` for unstaged, `git diff --cached` for staged, `git diff main...HEAD` for branch diff (3 dots = merge-base based)."
fallback = ""

[[hint]]
intent = "list npm packages"
keywords = ["npm", "pnpm", "yarn", "packages", "node"]
preferred = "pnpm list"
command = "pnpm list --depth=0     # or:    cat package.json | jq '.dependencies + .devDependencies'"
notes = "This project uses pnpm — never substitute npm or yarn (per project policy). For cross-workspace listings: `pnpm list -r`."
fallback = "cat package.json | jq '.dependencies + .devDependencies'"

[[hint]]
intent = "run tests"
keywords = ["test", "pytest", "jest", "vitest", "cargo test"]
preferred = "project-defined test command"
command = "look in package.json scripts, Cargo.toml, Makefile, or README; common: `pnpm test`, `cargo test`, `pytest`"
notes = "ALWAYS check the project's actual test command before guessing. Smoo AI projects use pnpm + vitest; smooth/ uses cargo test."
fallback = ""

[[hint]]
intent = "list pearls"
keywords = ["pearls", "tasks", "issues", "smooth"]
preferred = "th pearls"
command = "th pearls list --status=open"
notes = "Or `th pearls ready` for unblocked work, `th pearls show <id>` for details. Pearl ids are `th-<6 hex chars>`."
fallback = ""

[[hint]]
intent = "ping a host"
keywords = ["ping", "ICMP", "is it alive", "is X alive"]
preferred = "host_tool with ping"
command = "host_tool({tool: \"ping\", args: [\"-c\", \"3\", \"-W\", \"2000\", \"<HOSTNAME>\"]})"
notes = "ICMP is NOT routable from inside the sandbox (smoltcp proxy is TCP-only). Run it on Big Smooth's host instead via host_tool. Exit 0 + 'X packets received' = host is up; exit non-zero = unreachable. Treat bare hostnames literally — `smoo-hub` is `smoo-hub`, not `smoo-hub.com`. Do NOT substitute `curl http://<host>` for `ping <host>` — curl on port 80 fails on hosts that simply don't run HTTP, which is NOT proof the host is down."
fallback = ""

[[hint]]
intent = "check if a host is reachable on a port"
keywords = ["is it up", "is X up", "check host", "reach", "service status", "tailscale", "internal host"]
preferred = "host_tool with curl"
command = "host_tool({tool: \"curl\", args: [\"-fsS\", \"-o\", \"/dev/null\", \"-w\", \"%{http_code}\", \"http://<HOSTNAME>\"]})"
notes = "For HTTP/HTTPS service reachability — returns the status code (200/503/etc). Empty / curl-error means the port didn't answer; the host may still be alive on ICMP (try `ping` next if the user actually asked about host reachability rather than service reachability). There is NO `http_fetch` tool — if you find yourself wanting one, use `host_tool` with `curl`."
fallback = ""

[[hint]]
intent = "resolve a hostname"
keywords = ["resolve", "DNS", "nslookup", "dig", "what IP"]
preferred = "host_tool with dig"
command = "host_tool({tool: \"dig\", args: [\"+short\", \"<HOSTNAME>\"]})"
notes = "`dig +short` returns just the IPs, one per line. Use `host` or `nslookup` if dig isn't installed. Host machine's DNS resolver knows Tailscale / /etc/hosts entries the sandbox doesn't."
fallback = "host_tool({tool: \"host\", args: [\"<HOSTNAME>\"]})"
