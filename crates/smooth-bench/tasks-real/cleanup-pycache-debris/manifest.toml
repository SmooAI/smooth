[task]
id = "cleanup-pycache-debris"
description = "Delete __pycache__, .pyc, .pytest_cache, *.egg-info under a Python repo while preserving source"

[setup]
script = "setup.sh"
timeout_s = 30

[expect]
# setup.sh creates ~1.2MB of debris (50 __pycache__ dirs with avg
# 24KB of fake .pyc bytes per dir). expected_bytes_freed is a soft
# target — going over is fine, going under penalizes proportionally.
expected_bytes_freed = 1_000_000
must_preserve = [
    "pyproject.toml",
    "setup.py",
    "tests/conftest.py",
    "vendored/six.py",
    "src/pkg/__init__.py",
    "src/pkg/util.py",
]
should_delete = [
    "src/pkg/__pycache__",
    ".pytest_cache",
    "src/pkg.egg-info",
]

# Defaults are fine — bytes_freed=0.50, preserved=0.25,
# prompted=0.15, explanation=0.10. See score_cleanup::AxisWeights.
