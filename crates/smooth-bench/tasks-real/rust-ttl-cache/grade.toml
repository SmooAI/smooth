[task]
id = "rust-ttl-cache"
language = "rust"
human_baseline_edits = 3
human_baseline_lines = 80

[verify]
test_cmd = "cargo test --quiet"
expect_tool_invocations = ["cargo test", "cargo check"]
min_verify_invocations = 2

[weights]
pass = 0.50
edits = 0.15
verify = 0.15
tools = 0.10
cost = 0.10

[cost]
budget_usd = 0.50

[edits]
penalty_per_extra_file = 0.10
penalty_per_extra_100_lines = 0.05
