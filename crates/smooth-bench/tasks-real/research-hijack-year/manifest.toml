# Pearl th-f4ac64. First fixture for score-research dimension.
# Probes: web_search tool reach + the agent's discipline around writing
# a sourced answer instead of confidently guessing.

[task]
id = "research-hijack-year"
description = "Identify Hijack (Idris Elba TV series) premiere year + streaming service from a fuzzy description"

[expect]
answer_path = ".smooth/answer.txt"
# Both year + service must appear in the answer. Apple TV+ accepted in
# any of the spellings the official source uses ("Apple TV+", "Apple
# TV Plus") — the matcher is case-insensitive substring, so "apple tv"
# is enough.
expected_keywords = ["2023", "apple tv"]
# All keywords required (default 1.0). Partial credit is misleading on
# a binary fact-lookup probe.
min_correctness = 1.0

[weights]
answer_correctness = 0.85
cited_source = 0.15

[coach]
mode = "strict"
