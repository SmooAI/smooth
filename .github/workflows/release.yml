name: Release (Changesets 🦋)

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: release
    cancel-in-progress: false

env:
    CI: true

jobs:
    version:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
            actions: write
        outputs:
            published: ${{ steps.changesets.outputs.published }}
            publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
        steps:
            - name: Checkout code repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_PAT }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache Rust build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  cache-on-failure: true

            - name: Install dependencies
              run: pnpm install

            - name: Format check
              run: cargo fmt --check

            - name: Clippy
              run: cargo clippy -- -D warnings
              continue-on-error: true

            - name: Test
              run: cargo test

            - name: Build
              run: cargo build --release -p smooth-cli

            - name: Version Update 🦋
              id: changesets
              uses: changesets/action@v1
              with:
                  commit: "🦋 New version release"
                  title: "🦋 New version release"
                  publish: pnpm ci:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_PAT }}

            - name: Auto-Merge Changeset PR
              run: |
                  PR_NUMBER=$(gh pr list --state open --head changeset-release/main --json number --jq '.[0].number')

                  if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
                    echo "Found Changeset PR #$PR_NUMBER, attempting to auto-merge..."
                    gh pr merge "$PR_NUMBER" --auto --squash
                  else
                    echo "No open Changeset PR found, skipping merge."
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}

    build:
        name: Build ${{ matrix.target }}
        needs: version
        if: needs.version.outputs.published == 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Build web UI
              run: |
                  cd crates/smooth-web/web
                  pnpm install --frozen-lockfile
                  pnpm build

            - name: Build binary
              run: cargo build --release --target ${{ matrix.target }} -p smooth-cli
              env:
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

            - name: Package
              run: |
                  mkdir -p dist
                  cp target/${{ matrix.target }}/release/th dist/th-${{ matrix.target }}
                  tar czf dist/th-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release th

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: th-${{ matrix.target }}
                  path: dist/

    release:
        name: Create Release
        needs: [version, build]
        if: needs.version.outputs.published == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist/
                  merge-multiple: true

            - name: Get version
              id: version
              run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  files: dist/*
                  generate_release_notes: true
