name: Release

on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Build web UI
              run: |
                  cd crates/smooth-web/web
                  pnpm install --frozen-lockfile
                  pnpm build

            - name: Install nextest
              uses: taiki-e/install-action@nextest

            - name: Test
              run: cargo nextest run --profile ci
              continue-on-error: true

            - name: Build binary
              run: cargo build --release --target ${{ matrix.target }} -p smooth-cli
              env:
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

            - name: Package
              run: |
                  mkdir -p dist
                  cp target/${{ matrix.target }}/release/th dist/th-${{ matrix.target }}
                  tar czf dist/th-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release th

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: th-${{ matrix.target }}
                  path: dist/

    release:
        name: Create Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist/
                  merge-multiple: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/*
                  generate_release_notes: true
