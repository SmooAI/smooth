name: Release (Changesets 🦋)

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: release
    cancel-in-progress: false

env:
    CI: true

jobs:
    version:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
            actions: write
        outputs:
            published: ${{ steps.changesets.outputs.published }}
            publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
            should_release: ${{ steps.check_release.outputs.should_release }}

        steps:
            - name: Checkout code repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_PAT }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install system dependencies
              run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libcap-ng-dev pkg-config

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache Rust build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  cache-on-failure: true

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build web UI
              run: |
                  cd crates/smooth-web/web
                  pnpm install --no-frozen-lockfile
                  pnpm build

            - name: Format check
              run: cargo fmt --check

            - name: Clippy
              run: cargo clippy -- -D warnings
              continue-on-error: true

            - name: Test
              run: cargo test

            - name: Build
              run: cargo build --release -p smooai-smooth-cli

            - name: Version Update 🦋
              id: changesets
              uses: changesets/action@v1
              with:
                  commit: "🦋 New version release"
                  title: "🦋 New version release"
                  # Override the default `changeset version` so the version
                  # PR carries Cargo.toml + Cargo.lock bumps too (otherwise
                  # the Rust side drifts and `cargo publish` fails).
                  version: pnpm ci:version
                  publish: pnpm ci:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.SMOOAI_CARGO_REGISTRY_TOKEN }}

            - name: Check if release needed
              id: check_release
              run: |
                  # A release is needed when changesets says published OR when
                  # the current commit is a changeset merge (version was just bumped).
                  if [[ "${{ steps.changesets.outputs.published }}" == "true" ]]; then
                    echo "should_release=true" >> $GITHUB_OUTPUT
                  elif git log -1 --pretty=%s | grep -q "🦋 New version release"; then
                    echo "should_release=true" >> $GITHUB_OUTPUT
                  else
                    echo "should_release=false" >> $GITHUB_OUTPUT
                  fi

            - name: Auto-Merge Changeset PR
              continue-on-error: true
              run: |
                  PR_NUMBER=$(gh pr list --state open --head changeset-release/main --json number --jq '.[0].number')

                  if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
                    echo "Found Changeset PR #$PR_NUMBER, attempting to auto-merge..."
                    gh pr merge "$PR_NUMBER" --auto --squash || echo "Auto-merge not enabled for this repo — merge the changeset PR manually."
                  else
                    echo "No open Changeset PR found, skipping merge."
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}

    build:
        name: Build ${{ matrix.target }}
        needs: version
        if: needs.version.outputs.should_release == 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            # Don't cancel sibling targets when one fails — a regression on a
            # single platform shouldn't hold up the whole release.
            fail-fast: false
            matrix:
                include:
                    # x86_64-apple-darwin removed: microsandbox's upstream
                    # `msb_krun_utils` crate (0.1.9) uses `kvm_bindings`
                    # unconditionally and refuses to compile on Intel macOS.
                    # Apple Silicon is the only supported macOS target until
                    # upstream gates kvm_bindings to Linux.
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    # Native ARM runner — cross-compiling aarch64 from
                    # x86_64-ubuntu hit pkg-config's "no cross-compilation
                    # support" hard wall for libdbus-sys. A native arm64
                    # runner skips the whole multi-arch dance.
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-24.04-arm

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install Linux build deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  # libdbus-1-dev: libdbus-sys crate uses pkg-config to find it
                  # (pulled in transitively by the keyring/zbus chain that
                  # microsandbox depends on). Missing package fails with
                  # "pkg_config failed" at build time.
                  # libcap-ng-dev: linker needs `-lcap-ng` — microsandbox's
                  # Linux-only msb_krun_devices uses libcap-ng for CAP_*
                  # capability management in the VM host shim.
                  sudo apt-get install -y pkg-config libdbus-1-dev libcap-ng-dev


            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Build web UI
              run: |
                  cd crates/smooth-web/web
                  pnpm install --no-frozen-lockfile
                  pnpm build

            - name: Build binary
              run: cargo build --release --target ${{ matrix.target }} -p smooai-smooth-cli

            - name: Package
              run: |
                  mkdir -p dist
                  cp target/${{ matrix.target }}/release/th dist/th-${{ matrix.target }}
                  tar czf dist/th-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release th

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: th-${{ matrix.target }}
                  path: dist/

    release:
        name: Create Release
        needs: [version, build]
        if: needs.version.outputs.should_release == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist/
                  merge-multiple: true

            - name: Get version
              id: version
              run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  files: dist/*
                  generate_release_notes: true

    images:
        name: Publish OCI images to GHCR
        needs: [version, release]
        if: needs.version.outputs.should_release == 'true'
        # Native arm64 runner — operator/boardroom images are
        # `--platform linux/arm64` (guest runs aarch64 microVMs), so we
        # avoid qemu emulation by building on a matching host.
        runs-on: ubuntu-24.04-arm
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-unknown-linux-musl

            - name: Install Linux build deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libdbus-1-dev libcap-ng-dev musl-tools

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Build web UI (embedded in smooth-bigsmooth via rust-embed)
              run: |
                  cd crates/smooth-web/web
                  pnpm install --no-frozen-lockfile
                  pnpm build

            - name: Get version
              id: version
              run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Log in to GHCR
              run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build + push smooai/smooth-operator
              env:
                  SMOOTH_IMAGE_REPO: ghcr.io/smooai/smooth-operator
              run: scripts/build-smooth-operator-image.sh "${{ steps.version.outputs.version }}" --push

            - name: Build + push smooai/boardroom
              env:
                  SMOOTH_IMAGE_REPO: ghcr.io/smooai/boardroom
              run: scripts/build-boardroom-image.sh "${{ steps.version.outputs.version }}" --push
