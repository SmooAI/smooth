name: Release (Changesets 🦋)

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: release
    cancel-in-progress: false

env:
    CI: true
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    version:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
            actions: write
        outputs:
            published: ${{ steps.changesets.outputs.published }}
            publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
            should_release: ${{ steps.check_release.outputs.should_release }}

        steps:
            - name: Checkout code repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_PAT }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install system dependencies
              run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libcap-ng-dev libicu-dev pkg-config protobuf-compiler

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache Rust build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  cache-on-failure: true

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build web UI
              run: |
                  cd crates/smooth-web/web
                  pnpm install --no-frozen-lockfile
                  pnpm build

            - name: Build smooth-dolt (embedded Dolt for pearl memory tests)
              run: bash scripts/build-smooth-dolt.sh

            - name: Format check
              run: cargo fmt --check

            - name: Clippy
              run: cargo clippy -- -D warnings
              continue-on-error: true

            - name: Test
              run: cargo test

            - name: Build
              run: cargo build --release -p smooai-smooth-cli

            - name: Version Update 🦋
              id: changesets
              uses: changesets/action@v1
              with:
                  commit: "🦋 New version release"
                  title: "🦋 New version release"
                  # Override the default `changeset version` so the version
                  # PR carries Cargo.toml + Cargo.lock bumps too (otherwise
                  # the Rust side drifts and `cargo publish` fails).
                  version: pnpm ci:version
                  publish: pnpm ci:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.SMOOAI_CARGO_REGISTRY_TOKEN }}

            - name: Check if release needed
              id: check_release
              run: |
                  # A release is needed when changesets says published OR when
                  # the current commit is a changeset merge (version was just bumped).
                  if [[ "${{ steps.changesets.outputs.published }}" == "true" ]]; then
                    echo "should_release=true" >> $GITHUB_OUTPUT
                  elif git log -1 --pretty=%s | grep -q "🦋 New version release"; then
                    echo "should_release=true" >> $GITHUB_OUTPUT
                  else
                    echo "should_release=false" >> $GITHUB_OUTPUT
                  fi

            - name: Auto-Merge Changeset PR
              continue-on-error: true
              run: |
                  PR_NUMBER=$(gh pr list --state open --head changeset-release/main --json number --jq '.[0].number')

                  if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
                    echo "Found Changeset PR #$PR_NUMBER, attempting to auto-merge..."
                    gh pr merge "$PR_NUMBER" --auto --squash || echo "Auto-merge not enabled for this repo — merge the changeset PR manually."
                  else
                    echo "No open Changeset PR found, skipping merge."
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}

    build:
        name: Build ${{ matrix.target }}
        needs: version
        if: needs.version.outputs.should_release == 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            # Don't cancel sibling targets when one fails — a regression on a
            # single platform shouldn't hold up the whole release.
            fail-fast: false
            matrix:
                include:
                    # x86_64-apple-darwin removed: microsandbox's upstream
                    # `msb_krun_utils` crate (0.1.9) uses `kvm_bindings`
                    # unconditionally and refuses to compile on Intel macOS.
                    # Apple Silicon is the only supported macOS target until
                    # upstream gates kvm_bindings to Linux.
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      asset_name: th-macos-arm64.tar.gz
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      asset_name: th-linux-x86_64.tar.gz
                    # Native ARM runner — cross-compiling aarch64 from
                    # x86_64-ubuntu hit pkg-config's "no cross-compilation
                    # support" hard wall for libdbus-sys. A native arm64
                    # runner skips the whole multi-arch dance.
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-24.04-arm
                      asset_name: th-linux-arm64.tar.gz
                    # Windows: gated on sub-pearl th-WIN-GATE (filed
                    # 2026-05-29). smooth-cli currently has
                    # unconditional dependencies on smooth-bigsmooth
                    # (microsandbox — kvm_bindings, Linux-only) and
                    # smooth-code (ratatui TUI). Adding Windows to the
                    # matrix here requires a workspace-wide Cargo
                    # feature gate (default = "desktop", cli-windows =
                    # bare CLI surface only — pearls/jira/api/admin/
                    # auth/model/worktree/doctor/cache/audit/cast). Once
                    # that lands, uncomment + use --no-default-features
                    # --features cli-windows on this entry.

        continue-on-error: false

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install Linux build deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  # libdbus-1-dev: libdbus-sys crate uses pkg-config to find it
                  # (pulled in transitively by the keyring/zbus chain that
                  # microsandbox depends on). Missing package fails with
                  # "pkg_config failed" at build time.
                  # libcap-ng-dev: linker needs `-lcap-ng` — microsandbox's
                  # Linux-only msb_krun_devices uses libcap-ng for CAP_*
                  # capability management in the VM host shim.
                  sudo apt-get install -y pkg-config libdbus-1-dev libcap-ng-dev protobuf-compiler

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Build web UI
              run: |
                  cd crates/smooth-web/web
                  pnpm install --no-frozen-lockfile
                  pnpm build

            - name: Build binary
              run: cargo build --release --target ${{ matrix.target }} -p smooai-smooth-cli

            - name: Package (tar.gz)
              shell: bash
              run: |
                  mkdir -p dist
                  tar czf "dist/${{ matrix.asset_name }}" -C "target/${{ matrix.target }}/release" th

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.asset_name }}
                  path: dist/${{ matrix.asset_name }}

    release:
        name: Create Release
        needs: [version, build]
        if: needs.version.outputs.should_release == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist/
                  merge-multiple: true

            - name: Get version
              id: version
              run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  files: dist/*
                  generate_release_notes: true

    # Bump the SmooAI/homebrew-tools tap so `brew upgrade th` picks up
    # this release. Mirrors the pattern from SmooAI/smooblue's
    # release.yml — auth via an SSH deploy key on SmooAI/homebrew-tools
    # (HOMEBREW_TAP_DEPLOY_KEY here is the private half; the .pub is
    # registered as a write-enabled deploy key on the tap repo).
    #
    # Without the secret the job no-ops with a warning rather than
    # failing the release.
    #
    # Pearl th-e32f60.
    update-homebrew-tap:
        name: Update Homebrew tap
        needs: [version, build, release]
        if: needs.version.outputs.should_release == 'true'
        runs-on: ubuntu-latest
        steps:
            # Need package.json on disk to read the version that was
            # just bumped by the `version` job. Same `ref: main` as
            # the build job uses so we see the post-bump tree.
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Bump tap to this release
              env:
                  TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
              run: |
                  if [[ -z "${TAP_DEPLOY_KEY:-}" ]]; then
                      echo "::warning::HOMEBREW_TAP_DEPLOY_KEY not set — skipping tap update. \`brew\` users will pick up this release once the secret is configured + a future release is tagged."
                      exit 0
                  fi

                  VERSION=$(node -p "require('./package.json').version")
                  TAG="v${VERSION}"
                  echo "▸ release version = ${VERSION}"

                  # Fetch the three Unix asset tarballs and compute
                  # sha256. We deliberately fetch each one separately
                  # rather than the GH API release-assets endpoint so a
                  # missing asset (e.g. a target whose build failed)
                  # fails LOUDLY here rather than silently producing a
                  # broken Formula.
                  declare -A SHAS
                  for asset in th-macos-arm64.tar.gz th-linux-x86_64.tar.gz th-linux-arm64.tar.gz; do
                      url="https://github.com/SmooAI/smooth/releases/download/${TAG}/${asset}"
                      echo "▸ fetching ${asset}…"
                      curl -fsSL --retry 5 --retry-delay 4 "$url" -o "/tmp/${asset}" \
                          || { echo "::error::asset ${asset} missing from release ${TAG}"; exit 1; }
                      SHAS[$asset]=$(sha256sum "/tmp/${asset}" | cut -d' ' -f1)
                      echo "  sha256 = ${SHAS[$asset]}"
                  done

                  # Set up SSH with the deploy key.
                  echo "▸ setting up deploy key…"
                  mkdir -p ~/.ssh
                  printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy
                  chmod 600 ~/.ssh/tap_deploy
                  ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

                  echo "▸ cloning SmooAI/homebrew-tools…"
                  GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy -o IdentitiesOnly=yes" \
                      git clone git@github.com:SmooAI/homebrew-tools.git /tmp/tap
                  cd /tmp/tap

                  FORMULA="Formula/th.rb"
                  mkdir -p Formula

                  cat > "$FORMULA" <<EOF
                  # Generated by SmooAI/smooth release ${TAG}. Do not edit by hand —
                  # the next release will overwrite. See SmooAI/smooth release.yml
                  # (pearl th-e32f60) for the source of truth.
                  class Th < Formula
                    desc "Smoo AI CLI — agent orchestration, config management, and platform tools"
                    homepage "https://github.com/SmooAI/smooth"
                    version "${VERSION}"
                    license "MIT"

                    on_macos do
                      on_arm do
                        url "https://github.com/SmooAI/smooth/releases/download/${TAG}/th-macos-arm64.tar.gz"
                        sha256 "${SHAS[th-macos-arm64.tar.gz]}"
                      end
                    end

                    on_linux do
                      on_arm do
                        url "https://github.com/SmooAI/smooth/releases/download/${TAG}/th-linux-arm64.tar.gz"
                        sha256 "${SHAS[th-linux-arm64.tar.gz]}"
                      end
                      on_intel do
                        url "https://github.com/SmooAI/smooth/releases/download/${TAG}/th-linux-x86_64.tar.gz"
                        sha256 "${SHAS[th-linux-x86_64.tar.gz]}"
                      end
                    end

                    def install
                      bin.install "th"
                    end

                    test do
                      assert_match version.to_s, shell_output("#{bin}/th --version")
                    end
                  end
                  EOF

                  if git diff --quiet -- "$FORMULA"; then
                      echo "▸ tap already at ${VERSION} — nothing to push"
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add "$FORMULA"
                  git commit \
                      -m "th ${VERSION}" \
                      -m "Automated bump from SmooAI/smooth release ${TAG}."
                  GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy -o IdentitiesOnly=yes" \
                      git push origin main
                  echo "✓ tap bumped to ${VERSION}"
