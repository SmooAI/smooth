name: PR Checks

on:
    pull_request:
        branches: [main]

jobs:
    rust:
        name: Rust checks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - name: Install system dependencies
              run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - uses: Swatinem/rust-cache@v2

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Build web UI
              run: |
                  cd crates/smooth-web/web
                  pnpm install --frozen-lockfile
                  pnpm build

            - name: Install nextest
              uses: taiki-e/install-action@nextest

            - name: Format check
              run: cargo fmt --check

            - name: Clippy
              run: cargo clippy -- -D warnings
              continue-on-error: true  # pedantic warnings shouldn't block

            - name: Test
              run: cargo nextest run --profile ci
              env:
                  NEXTEST_EXPERIMENTAL_LIBTEST_JSON: 1

            - name: Publish test report
              if: always()
              uses: ctrf-io/github-test-reporter@v1
              with:
                  report-path: target/nextest/ci/junit.xml
                  report-format: junit
              continue-on-error: true

            - name: Build
              run: cargo build --release -p smooth-cli

    web:
        name: Web checks
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install
              run: cd crates/smooth-web/web && pnpm install --frozen-lockfile

            - name: Build
              run: cd crates/smooth-web/web && pnpm build
